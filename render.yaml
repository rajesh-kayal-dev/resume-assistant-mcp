services:
  - type: web
    name: resume-assistant-mcp
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: GROQ_API_KEY
        sync: false
